# Server Configuration
server.port=8081

# Load local environment file if present
spring.config.import=optional:file:.env[.properties]

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/electromart_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (disabled when using MySQL)
spring.h2.console.enabled=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:ElectroMartSecretKey2026ElectroMartSecretKey2026ElectroMartSecretKey2026}
app.jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Logging
logging.level.com.electromart=DEBUG
logging.level.org.springframework.security=DEBUG
